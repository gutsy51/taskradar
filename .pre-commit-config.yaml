repos:
  - repo: local
    hooks:
      - id: ruff-backend
        name: ruff (backend)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "ruff", "check", "--fix"]
        language: system
        pass_filenames: true
        files: ^backend/
        types: [python]

      - id: ruff-format-backend
        name: ruff-format (backend)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "ruff", "format"]
        language: system
        pass_filenames: true
        files: ^backend/
        types: [python]

      - id: mypy-backend
        name: mypy (backend)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "mypy", "--config-file", "backend/pyproject.toml"]
        language: system
        pass_filenames: true
        files: ^backend/
        types: [python]

      - id: bandit-backend
        name: bandit (backend)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "bandit"]
        language: system
        pass_filenames: true
        files: ^backend/
        types: [python]

      - id: ruff-libs
        name: ruff (libs)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "ruff", "check", "--fix"]
        language: system
        pass_filenames: true
        files: ^libs/
        types: [python]

      - id: ruff-format-libs
        name: ruff-format (libs)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "ruff", "format"]
        language: system
        pass_filenames: true
        files: ^libs/
        types: [python]

      - id: mypy-libs
        name: mypy (libs)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "mypy", "--config-file", "backend/pyproject.toml"]
        language: system
        pass_filenames: true
        files: ^libs/
        types: [python]

      - id: bandit-libs
        name: bandit (libs)
        entry: backend/.venv/Scripts/python.exe
        args: ["-m", "bandit"]
        language: system
        pass_filenames: true
        files: ^libs/
        types: [python]
